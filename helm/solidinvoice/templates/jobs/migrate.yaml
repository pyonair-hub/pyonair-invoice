apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "solidinvoice.fullname" . }}-migrate
  labels:
    {{- include "solidinvoice.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "solidinvoice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "solidinvoice.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- $mysqlInit := trim (include "solidinvoice.mysqlInitContainer" .) }}
      {{- $postgresqlInit := trim (include "solidinvoice.postgresqlInitContainer" .) }}
      {{- if or $mysqlInit $postgresqlInit }}
      initContainers:
        {{- if $mysqlInit }}
        {{- $mysqlInit | nindent 8 }}
        {{- end }}
        {{- if $postgresqlInit }}
        {{- $postgresqlInit | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "solidinvoice.imageName" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/solidinvoice
            - console
            - doctrine:migrations:migrate
            - --no-interaction
            - --no-ansi
          {{- include "solidinvoice.commonEnv" . | nindent 10 }}
          volumeMounts:
            {{- include "solidinvoice.configVolumeMount" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        {{- include "solidinvoice.configVolume" . | nindent 8 }}
