{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "solidinvoice.fullname" . }}
  labels:
    {{- include "solidinvoice.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "solidinvoice.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8765
          protocol: TCP
  egress:
    - {}
{{- end }}
