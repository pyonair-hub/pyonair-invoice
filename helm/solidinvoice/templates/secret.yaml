{{- $fullName := include "solidinvoice.fullname" . -}}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $fullName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "solidinvoice.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{/* App secret - preserved across upgrades */}}
  {{- if .Values.app.secret }}
  SOLIDINVOICE_APP_SECRET: {{ .Values.app.secret | quote }}
  {{- else if and $existingSecret (index $existingSecret.data "SOLIDINVOICE_APP_SECRET") }}
  SOLIDINVOICE_APP_SECRET: {{ index $existingSecret.data "SOLIDINVOICE_APP_SECRET" | b64dec | quote }}
  {{- else }}
  SOLIDINVOICE_APP_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{/* Mailer DSN */}}
  {{- if not .Values.mailer.existingSecret }}
  SOLIDINVOICE_MAILER_DSN: {{ .Values.mailer.dsn | quote }}
  {{- end }}
  {{/* Database URL */}}
  {{- if .Values.externalDatabase.url }}
  SOLIDINVOICE_DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- else if .Values.mysql.enabled }}
  SOLIDINVOICE_DATABASE_URL: {{ printf "mysql://%s:%s@%s-mysql:3306/%s?serverVersion=8.0&charset=utf8mb4" .Values.mysql.auth.username (required "mysql.auth.password is required when mysql.enabled=true" .Values.mysql.auth.password) .Release.Name .Values.mysql.auth.database | quote }}
  {{- else if .Values.postgresql.enabled }}
  SOLIDINVOICE_DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username (required "postgresql.auth.password is required when postgresql.enabled=true" .Values.postgresql.auth.password) .Release.Name .Values.postgresql.auth.database | quote }}
  {{- end }}
  {{/* Messenger DSN */}}
  {{- if .Values.messenger.dsn }}
  SOLIDINVOICE_MESSENGER_DSN: {{ .Values.messenger.dsn | quote }}
  {{- else if .Values.redis.enabled }}
  {{- if .Values.redis.auth.enabled }}
  SOLIDINVOICE_MESSENGER_DSN: {{ printf "redis://default:%s@%s-redis-master:6379/0" (required "redis.auth.password is required when redis.enabled=true and redis.auth.enabled=true" .Values.redis.auth.password) .Release.Name | quote }}
  {{- else }}
  SOLIDINVOICE_MESSENGER_DSN: {{ printf "redis://%s-redis-master:6379/0" .Release.Name | quote }}
  {{- end }}
  {{- else }}
  SOLIDINVOICE_MESSENGER_DSN: "doctrine://default?queue_name=async"
  {{- end }}
  {{/* Sentry DSN */}}
  {{- if and .Values.sentry.enabled (not .Values.sentry.existingSecret) }}
  SOLIDINVOICE_SENTRY_DSN: {{ .Values.sentry.dsn | quote }}
  {{- end }}
  {{/* OAuth credentials */}}
  {{- if and .Values.oauth.google.enabled (not .Values.oauth.google.existingSecret) }}
  SOLIDINVOICE_OAUTH_GOOGLE_CLIENT_ID: {{ .Values.oauth.google.clientId | quote }}
  SOLIDINVOICE_OAUTH_GOOGLE_CLIENT_SECRET: {{ .Values.oauth.google.clientSecret | quote }}
  {{- end }}
