platform:
    name: SolidInvoice
    version: 3.0.x

    security:
        two_factor:
            enabled: true
            base_template: "@SolidInvoiceCore/Layout/two_factor_security.html.twig"
    models:
        user: SolidInvoice\UserBundle\Entity\User

saas:
    doctrine:
        subscriptions:
            entity: SolidInvoice\CoreBundle\Entity\Company
        trial:
            user_entity: SolidInvoice\UserBundle\Entity\User
    payment:
        return_route: saas_payment_success
    integration:
        lemon_squeezy:
            enabled: true
            api_key: '%env(SOLIDINVOICE_LEMON_SQUEEZY_API_KEY)%'
            webhook_secret: '%env(SOLIDINVOICE_LEMON_SQUEEZY_WEBHOOK_SECRET)%'
            store_id: '%env(SOLIDINVOICE_LEMON_SQUEEZY_STORE_ID)%'

ui:
    templates:
        base: '@SolidInvoiceCore/Layout/base.html.twig'
        login: '@SolidInvoiceUser/Security/login.html.twig'
