onboarding:
    signature:
        greeting: See you inside,
        team: — The SolidInvoice team
    footer:
        tagline: Invoicing for freelancers and small businesses.
        reason: You're receiving this because you signed up for SolidInvoice.
    welcome:
        subject: "Welcome to SolidInvoice — let's get you paid"
        eyebrow: Your trial just started
        heading: "Good to have you, %name%."
        lede: "Your trial is live. Over the next few emails we'll walk you through getting your first invoice paid — step by step, starting now."
        intro: "Here's what we'll cover together:"
        feature:
            clients:
                title: Add your first client
                desc: The foundation. Name, email, currency — takes sixty seconds.
            invoices:
                title: Send a professional invoice
                desc: Line items, taxes, discounts, and a due date — all built in.
            payments:
                title: Connect online payments
                desc: Stripe or PayPal — clients pay in two clicks, you're notified instantly.
            dashboard:
                title: Automate recurring work
                desc: Set up recurring billing and automatic reminders. Get paid every month without lifting a finger.
        closing: "Start with the first step: add a client. Everything else builds from there."
        cta: Open your dashboard
        ps: "questions? Hit reply — a real person answers."
    add_first_client:
        subject: "Add your first client — 60 seconds to get started"
        eyebrow: "Step 1 · Your first client"
        heading: "No client, no invoice. Let's fix that."
        lede: "Your client list is where everything starts. Add one client and you can immediately create quotes, invoices, and track every payment they owe — all in one place."
        mock:
            url: solidinvoice.app/clients
            header: Your clients
            client1:
                name: Northbeam Design Studio
                sub: "hello@northbeam.co · 3 invoices"
            client2:
                name: Maple & Knox LLC
                sub: "billing@mapleknox.com · 1 invoice"
            empty:
                name: Your next client appears here
                sub: "name, email, and billing address"
        needs_heading: What you'll need
        needs_intro: "Three fields to get started. You can fill in the rest later."
        needs:
            1: Client name or company name
            2: An email address for invoices
            3: Billing currency
        cta: Add your first client
    send_first_invoice:
        subject: "Your first invoice is one click away"
        eyebrow: "Step 2 · Your first invoice"
        heading: "Time to send your first invoice."
        lede: "Sending a professional invoice takes under five minutes. Pick your client, add line items, set a due date — SolidInvoice handles the formatting, delivery, and tracking."
        mock:
            label: Invoice
            status_sent: Sent
            billed_to: Billed to
            client_name: Northbeam Design Studio
            client_email: hello@northbeam.co
            due: Due
            due_date: May 8, 2026
            due_terms: Net 14 days
            col_desc: Description
            col_qty: Qty
            col_rate: Rate
            col_amount: Amount
            item1: Brand identity · discovery
            item2: Logo design & revisions
            total_due: Total due
        included_heading: "Included on every invoice, nothing extra to configure"
        included_body: "Line items, taxes, discounts, recurring schedules, and due dates — built in. Add a payment method in the next step and your client gets a 'Pay now' button too."
        cta: Create your first invoice
        ps: "tip: connect a payment method before sending and your client will see a 'Pay now' button. Online invoices get paid much faster."
    turn_invoices_into_payments:
        subject: "Let your clients pay with one click"
        eyebrow: "Step 3 · Online payments"
        heading: "Invoices don't pay themselves."
        lede: "Connect Stripe or PayPal once and every invoice you send gets a 'Pay now' button. Your client pays from any device in seconds — you're notified the moment it goes through."
        method:
            cards: Cards
            wallet: Wallet
            bank: Bank
            eu_bank: EU bank
        callout:
            title: "Invoices with an online payment option get paid significantly faster than bank-transfer-only invoices"
            sub: "When paying is easy, clients pay. Make it easy."
        how_heading: How it works
        how:
            1: "Go to Settings → Payment methods and connect Stripe or PayPal (30 seconds)."
            2: "Every invoice you send automatically includes a 'Pay now' button."
            3: "Your client pays. You're notified immediately. Invoice status flips to <b style=\"color: #2e963a;\">Paid</b>."
        cta: Connect a payment method
        ps: "SolidInvoice adds zero fees on top of your payment provider. You pay only what Stripe or PayPal charge."
    recurring_billing:
        subject: "Set up once, get paid every month"
        eyebrow: "Step 4 · Recurring billing"
        heading: "Your best clients pay you every month. Automate it."
        lede: "Create an invoice once and SolidInvoice sends it automatically on your schedule. Set up payment reminders and overdue invoices get followed up — without you lifting a finger."
        how_heading: How it works
        how:
            1: "Create an invoice and mark it as recurring — set the frequency and start date."
            2: "SolidInvoice sends it automatically on schedule. Your client receives it and pays it."
            3: "Enable reminders and overdue invoices get followed up automatically — no chasing required."
        compare_heading: Stop doing this manually
        before_heading: Without recurring billing
        after_heading: With SolidInvoice
        before:
            1: Manual invoicing every billing cycle
            2: Tracking who owes what in a spreadsheet
            3: Chasing late payments yourself
        after:
            1: Automatic invoices sent on your schedule
            2: Dashboard shows every outstanding amount
            3: Reminders sent automatically on your behalf
        cta: Set up recurring billing
        ps: "even one recurring client makes this worth doing — you'll save hours every month."
    customize_logo:
        subject: "Put your brand on your invoices"
        eyebrow: "Step 5 · Make it yours"
        heading: "Your logo. Your brand. Your invoices."
        lede: "Clients judge professionalism before they read a single line item. A branded invoice — your logo, your name — signals that you run a real business."
        before_label: Before
        after_label: After
        after_brand: Your Studio
        steps_heading: Two things to customize
        step:
            1:
                title: Upload your logo
                desc: "PNG, SVG, or JPG. Appears on every invoice and quote you send."
            2:
                title: Set your sender name
                desc: "Customize the name clients see when your invoices land in their inbox."
        cta: Brand your invoices
        ps: "on the paid plan, you can disable SolidInvoice branding in Settings — your clients will see only your name."
    trial_about_to_end:
        subject: "Your trial ends tomorrow|Your trial ends in %days% days"
        eyebrow: "Heads up · Trial ending"
        heading: "Your trial ends tomorrow.|Your trial ends in %days% days."
        lede: "When your trial ends, your account locks. Your data stays safe — clients, invoices, payment history — but you won't be able to access or send anything until you subscribe."
        days_label: Days remaining
        trial_ends: "Trial ends <b style=\"color: #475569;\">%date%</b>"
        usage_heading: Your workspace so far
        usage:
            clients: Clients added
            invoices: Invoices sent
            collected: Collected
        body_intro: "Subscribing takes about 30 seconds. Your workspace picks up exactly where it left off — nothing is archived, nothing is hidden."
        if_not_heading: "What happens when your trial ends"
        if_not:
            1: "Your account locks — you won't be able to log in or access any data."
            2: "Pending invoices won't be delivered. Recurring billing pauses."
            3: "Clients can still pay existing invoices via their direct payment links."
            4: "Reactivate any time — everything restores immediately on subscription."
        cta:
            upgrade: Subscribe and keep going
        fine_print: "Questions about billing or what to expect? Reply to this email — we read every one."
        ps: "use code <b>%coupon_code%</b> at checkout for 30% off your first three months. Offer expires when your trial does."
    upgrade_offer:
        subject: "Your special offer expires with your trial"
        eyebrow: Last chance
        heading: "One last thing before your trial closes."
        lede: "When your trial ends, your account locks. Before that happens — here's an offer to make subscribing an easy decision."
        per: / month
        coupon_heading: "Your discount code"
        coupon_desc: "30% off your first three months. Enter this code at checkout."
        feature:
            1: "Unlimited clients and invoices"
            2: "Recurring billing on any schedule"
            3: "Automatic payment reminders"
            4: "Online payments via your own Stripe or PayPal account"
            5: "Multiple team members on one account"
            6: "Backups, updates, and SolidInvoice branding removed from your invoices"
        cta: "Subscribe now"
        fine_print: "Cancel anytime. No surprise fees. Your data restores immediately on subscription."
        ps: "your account locks when the trial ends. Subscribe before that happens to keep sending without interruption."
