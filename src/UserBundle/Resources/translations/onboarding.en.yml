        benefits: |
            Create your first invoice in the next step
            Keep all client info organized in one place
            Track payment history and outstanding invoices
            Send invoices directly via email
        fields:
            name:
                label: 'Client Name'
                placeholder: 'John Doe or Acme Corp'
                help: 'Can be a person or company name'
            email:
                label: 'Email Address'
                placeholder: 'client@example.com'
                help: "We'll use this to send them invoices"

    invoice:
        title: 'Create your first invoice'
        description: 'Experience how easy it is to get paid.'
